<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Phân tích Bot Telegram Quản lý Album</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #22222f;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --text2: #a0a0b0;
            --accent: #6c8cff;
            --accent2: #4a6cf7;
            --critical: #ff4757;
            --high: #ff6b35;
            --medium: #f0a500;
            --low: #2ed573;
            --done: #27ae60;
            --done-bg: rgba(39, 174, 96, 0.12);
            --tag-critical-bg: rgba(255, 71, 87, 0.15);
            --tag-high-bg: rgba(255, 107, 53, 0.15);
            --tag-medium-bg: rgba(240, 165, 0, 0.15);
            --tag-low-bg: rgba(46, 213, 115, 0.15);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* Header */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(26, 26, 36, 0.85);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title .icon {
            font-size: 1.8rem;
        }
        .header-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .stat-badge .count {
            color: var(--accent);
            font-size: 1.1rem;
        }
        .stat-badge.done .count {
            color: var(--done);
        }

        /* Progress bar */
        .progress-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text2);
        }
        .progress-bar {
            height: 8px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent2), var(--done));
            border-radius: 4px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* Filter chips */
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-chip {
            padding: 7px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
            color: var(--text2);
        }
        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .filter-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .filter-chip.all {
            font-weight: 600;
        }
        .filter-chip.critical {
            border-color: var(--critical);
            color: var(--critical);
        }
        .filter-chip.critical.active {
            background: var(--critical);
            color: #fff;
        }
        .filter-chip.high {
            border-color: var(--high);
            color: var(--high);
        }
        .filter-chip.high.active {
            background: var(--high);
            color: #fff;
        }
        .filter-chip.medium {
            border-color: var(--medium);
            color: var(--medium);
        }
        .filter-chip.medium.active {
            background: var(--medium);
            color: #111;
        }
        .filter-chip.low {
            border-color: var(--low);
            color: var(--low);
        }
        .filter-chip.low.active {
            background: var(--low);
            color: #111;
        }

        /* Sections */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: var(--transition);
            gap: 12px;
        }
        .section-header:hover {
            background: var(--surface2);
        }
        .section-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header .arrow {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
            color: var(--text2);
        }
        .section.collapsed .section-body {
            display: none;
        }
        .section.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .section-body {
            padding: 0 20px 16px;
        }

        /* Sub-section */
        .sub-section {
            margin-bottom: 16px;
        }
        .sub-section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        /* Checklist items */
        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            border: 1px solid transparent;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .checklist-item:hover {
            background: var(--surface2);
            border-color: var(--border);
        }
        .checklist-item.checked .item-text {
            text-decoration: line-through;
            opacity: 0.55;
        }
        .checklist-item.checked {
            background: var(--done-bg);
            border-color: rgba(39, 174, 96, 0.2);
        }
        .check-box {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border-radius: 5px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            margin-top: 1px;
            font-size: 0.7rem;
            color: transparent;
        }
        .checklist-item.checked .check-box {
            background: var(--done);
            border-color: var(--done);
            color: #fff;
        }
        .item-content {
            flex: 1;
            min-width: 0;
        }
        .item-text {
            font-size: 0.92rem;
            font-weight: 500;
            word-break: break-word;
        }
        .item-desc {
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 3px;
        }
        .item-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .tag.critical {
            background: var(--tag-critical-bg);
            color: var(--critical);
        }
        .tag.high {
            background: var(--tag-high-bg);
            color: var(--high);
        }
        .tag.medium {
            background: var(--tag-medium-bg);
            color: var(--medium);
        }
        .tag.low {
            background: var(--tag-low-bg);
            color: var(--low);
        }
        .tag.feature {
            background: rgba(108, 140, 255, 0.12);
            color: var(--accent);
        }
        .tag.plan {
            background: rgba(160, 160, 176, 0.1);
            color: #aaa;
        }

        /* Code block */
        .code-block {
            background: #0a0a12;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-top: 8px;
            font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.78rem;
            overflow-x: auto;
            white-space: pre-wrap;
            color: #b0b0c0;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn {
            padding: 9px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            color: var(--text);
        }
        .btn:hover {
            border-color: var(--accent);
            background: var(--surface2);
        }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn.primary:hover {
            background: var(--accent2);
        }
        .btn.danger {
            border-color: var(--critical);
            color: var(--critical);
        }
        .btn.danger:hover {
            background: var(--tag-critical-bg);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .toast.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-stats {
                gap: 8px;
            }
            .section-header h2 {
                font-size: 0.95rem;
            }
            .checklist-item {
                padding: 8px 10px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-title">
                <span class="icon">🤖</span> Checklist Bot Telegram Album
            </div>
            <div class="header-stats">
                <div class="stat-badge">📋 Tổng: <span class="count" id="totalCount">0</span></div>
                <div class="stat-badge done">✅ Đã xong: <span class="count" id="doneCount">0</span></div>
                <div class="stat-badge">📊 % <span class="count" id="percentText">0%</span></div>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-label">
                <span>Tiến độ hoàn thành</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-row">
            <span class="filter-chip all active" data-filter="all">📋 Tất cả</span>
            <span class="filter-chip critical" data-filter="critical">🔴 Critical</span>
            <span class="filter-chip high" data-filter="high">🟠 High</span>
            <span class="filter-chip medium" data-filter="medium">🟡 Medium</span>
            <span class="filter-chip low" data-filter="low">🟢 Low</span>
            <span class="filter-chip" data-filter="feature">💡 Tính năng</span>
            <span class="filter-chip" data-filter="plan">📅 Kế hoạch</span>
        </div>

        <!-- Buttons -->
        <div class="btn-row">
            <button class="btn primary" onclick="checkAll()">✅ Check tất cả</button>
            <button class="btn" onclick="uncheckAll()">⬜ Bỏ check tất cả</button>
            <button class="btn danger" onclick="resetAll()">🔄 Reset về mặc định</button>
            <button class="btn" onclick="exportState()">📋 Xuất trạng thái</button>
        </div>

        <!-- SECTIONS sẽ được render bằng JS -->
        <div id="sectionsContainer"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ==================== DATA ====================
            const checklistData = [{
                id: 'sec1',
                title: '🔐 1. Vấn đề bảo mật & lỗ hổng tiềm ẩn',
                subs: [{
                    title: 'Bảo mật & Lỗ hổng',
                    items: [
                        { id: 's1-1', text: 'Callback data vượt quá 64 byte', desc: 'Lưu keyword vào session thay vì encode trong callback data', tags: ['critical'],
                            code: 'Sửa callback data myp_ thành myp_${page}_${userId}, lưu keyword vào searchSessions' },
                        { id: 's1-2', text: 'Race condition trên upload session', desc: 'Dùng hàng đợi xử lý tuần tự (async-mutex hoặc queue)', tags: ['high'],
                            code: 'Tạo uploadQueues[userId] để enqueue tuần tự các handler' },
                        { id: 's1-3', text: 'Không giới hạn số lượng GIF gửi riêng lẻ', desc: 'Giới hạn tối đa 50 GIF, hoặc gửi dạng document', tags: ['medium'] },
                        { id: 's1-4', text: 'Không có xác thực mạnh cho admin', desc: 'Thêm cảnh báo nếu danh sách admin trống, cho phép cấu hình qua lệnh', tags: ['medium'] },
                        { id: 's1-5', text: 'Lộ thông tin album qua ID (base64url)', desc: 'Cân nhắc thêm quyền public/private cho album', tags: ['low'] },
                        { id: 's1-6', text: 'Không kiểm tra dung lượng file upload', desc: 'Dùng getFile để lấy kích thước và từ chối nếu quá lớn', tags: ['low'] },
                    ]
                }]
            }, {
                id: 'sec2',
                title: '🐛 2. Lỗi logic & xử lý ngoại lệ',
                subs: [{
                    title: 'Lỗi logic',
                    items: [
                        { id: 's2-1', text: 'Thiếu error handler toàn cục (bot.catch)', desc: 'Thêm bot.catch để bắt lỗi không mong muốn', tags: ['critical'],
                            code: 'bot.catch((err, ctx) => { console.error(err); ctx.reply(\'Đã xảy ra lỗi.\'); })' },
                        { id: 's2-2', text: 'Xử lý lỗi gửi media group bỏ qua (không retry)', desc: 'Tích lũy lỗi, thông báo số nhóm thành công, retry với apiCall', tags: ['high'] },
                        { id: 's2-3', text: 'View session chỉ dành cho một album (ghi đè)', desc: 'Dùng key userId:albumId hoặc session ID duy nhất', tags: ['medium'] },
                        { id: 's2-4', text: 'updateAlbumMenu xóa tin nhắn cũ có thể lỗi', desc: 'Dùng isBenignTelegramError để phân biệt lỗi', tags: ['medium'] },
                        { id: 's2-5', text: 'handlePageSelect không cập nhật currentIndex nếu lỗi', desc: 'Thêm retry hoặc thông báo rõ hơn', tags: ['low'] },
                        { id: 's2-6', text: 'Session cleanup có thể xóa session khi đang chờ tên', desc: 'Cập nhật lastActivity trong finalizeUpload khi bắt đầu chờ tên', tags: ['medium'],
                            code: 's.waitingForName = true; s.lastActivity = Date.now();' },
                    ]
                }]
            }, {
                id: 'sec3',
                title: '⚡ 3. Hiệu năng & khả năng mở rộng',
                subs: [{
                    title: 'Hiệu năng',
                    items: [
                        { id: 's3-1', text: 'Truy vấn LIKE không dùng index hiệu quả', desc: 'Cân nhắc dùng FTS5 (Full-Text Search) của SQLite', tags: ['medium'] },
                        { id: 's3-2', text: 'Session trong bộ nhớ RAM không scale', desc: 'Chuyển sang Redis hoặc lưu DB với TTL khi mở rộng', tags: ['medium'] },
                        { id: 's3-3', text: 'Gửi media group không dùng apiCall (thiếu retry)', desc: 'Sử dụng apiCall cho mọi lần gửi media group', tags: ['medium'] },
                        { id: 's3-4', text: 'Blocking I/O với better-sqlite3', desc: 'Với <100 user thì ổn, có thể chuyển async nếu cần', tags: ['low'] },
                    ]
                }]
            }, {
                id: 'sec4',
                title: '🏗️ 4. Cấu trúc code & khả năng bảo trì',
                subs: [{
                    title: 'Điểm cần cải thiện',
                    items: [
                        { id: 's4-1', text: 'Một số hàm quá dài (handlePageSelect, sendAlbumToUser)', desc: 'Tách thành các hàm nhỏ hơn', tags: ['low'] },
                        { id: 's4-2', text: 'Thiếu module hóa (tất cả trong một file)', desc: 'Tách riêng DB layer, session manager, view renderer', tags: ['low'] },
                        { id: 's4-3', text: 'Xử lý lỗi còn rời rạc, thiếu cơ chế tập trung', desc: 'Tạo error handling middleware', tags: ['low'] },
                        { id: 's4-4', text: 'Sử dụng biến global uploadSessions, viewSessions', desc: 'Tạo class SessionManager', tags: ['low'] },
                        { id: 's4-5', text: 'Chưa có unit test', desc: 'Viết unit test cho các chức năng chính', tags: ['low'] },
                    ]
                }]
            }, {
                id: 'sec5',
                title: '🎨 5. Trải nghiệm người dùng & UI',
                subs: [{
                    title: 'Điểm còn thiếu',
                    items: [
                        { id: 's5-1', text: 'Không có tính năng xem trước album trước khi đặt tên', desc: 'Thêm preview album', tags: ['feature'] },
                        { id: 's5-2', text: 'Khi gửi album nhiều GIF, không có thanh tiến trình', desc: 'Thêm progress indicator', tags: ['feature'] },
                        { id: 's5-3', text: 'Không có lựa chọn sắp xếp album (theo tên, ngày tạo)', desc: 'Thêm sort options', tags: ['feature'] },
                        { id: 's5-4', text: 'Khi tìm kiếm không có kết quả, không có gợi ý', desc: 'Thêm gợi ý tìm kiếm', tags: ['feature'] },
                        { id: 's5-5', text: 'Không có tính năng chỉnh sửa metadata (caption, mô tả)', desc: 'Thêm edit metadata', tags: ['feature'] },
                    ]
                }]
            }, {
                id: 'sec6',
                title: '📦 6. Các tính năng còn thiếu (nên có)',
                subs: [{
                    title: 'Tính năng đề xuất',
                    items: [
                        { id: 's6-1', text: 'Chỉnh sửa album (thêm/xóa file, đổi tên)', desc: 'Ưu tiên High', tags: ['high', 'feature'] },
                        { id: 's6-2', text: 'Xóa nhiều album (chọn hàng loạt)', desc: 'Ưu tiên Medium', tags: ['medium', 'feature'] },

                        { id: 's6-6', text: 'Export/Import album (JSON hoặc zip)', desc: 'Ưu tiên Low', tags: ['low', 'feature'] },
                        { id: 's6-7', text: 'Hỗ trợ caption cho từng file khi upload', desc: 'Ưu tiên Medium', tags: ['medium', 'feature'] },
                        { id: 's6-8', text: 'Tìm kiếm nâng cao (theo ngày, loại file)', desc: 'Ưu tiên Medium', tags: ['medium', 'feature'] },
                        { id: 's6-9', text: 'Chế độ công khai/riêng tư cho album', desc: 'Ưu tiên Medium', tags: ['medium', 'feature'] },
                        { id: 's6-10', text: 'Gửi album qua tin nhắn cho người khác', desc: 'Ưu tiên Medium', tags: ['medium', 'feature'] },
                    ]
                }]
            }, {
                id: 'sec7',
                title: '🔧 7. Đề xuất sửa lỗi cụ thể (theo khối code)',
                subs: [{
                    title: 'Sửa lỗi cụ thể',
                    items: [
                        { id: 's7-1', text: '7.1 - Sửa callback data vượt 64 byte (Critical)', desc: 'Tạo searchSessions, sửa callback data', tags: ['critical'],
                            code: 'const searchSessions = {};\n// Trong renderMyUploadsPage: searchSessions[userId] = { keyword, page };\n// Callback: myp_${page}_${userId}, lấy keyword từ searchSessions' },
                        { id: 's7-2', text: '7.2 - Thêm error handler toàn cục (Critical)', desc: 'Thêm bot.catch()', tags: ['critical'],
                            code: 'bot.catch((err, ctx) => { console.error(err); ctx.reply(\'⚠️ Đã xảy ra lỗi.\'); })' },
                        { id: 's7-3', text: '7.3 - Sửa race condition upload session (High)', desc: 'Dùng hàng đợi uploadQueues[userId]', tags: ['high'],
                            code: 'const uploadQueues = {};\nasync function enqueueUpload(userId, handler) { ... }' },
                        { id: 's7-4', text: '7.4 - Cập nhật lastActivity khi chờ tên (Medium)', desc: 'Thêm s.lastActivity = Date.now() khi set waitingForName', tags: ['medium'] },
                        { id: 's7-5', text: '7.5 - Hỗ trợ nhiều view session (Medium)', desc: 'Dùng key userId:albumId', tags: ['medium'],
                            code: 'function getViewSessionKey(userId, albumId) { return `${userId}:${albumId}`; }' },
                        { id: 's7-6', text: '7.6 - Cải thiện gửi media group với apiCall (Medium)', desc: 'Dùng apiCall(() => ctx.replyWithMediaGroup(chunk))', tags: ['medium'] },
                        { id: 's7-7', text: '7.7 - Giới hạn số GIF hiển thị (Medium)', desc: 'Giới hạn MAX_GIF_DISPLAY = 50', tags: ['medium'] },
                        { id: 's7-8', text: '7.8 - Tách hàm dài (Low)', desc: 'Tách handlePageSelect, sendAlbumToUser', tags: ['low'] },
                    ]
                }]
            }, {
                id: 'sec8',
                title: '📊 8. Tổng hợp ưu tiên cải thiện',
                subs: [{
                    title: 'Ưu tiên',
                    items: [
                        { id: 's8-1', text: '[Critical] Callback data vượt 64 byte', tags: ['critical'] },
                        { id: 's8-2', text: '[Critical] Thiếu error handler toàn cục', tags: ['critical'] },
                        { id: 's8-3', text: '[High] Race condition trên upload session', tags: ['high'] },
                        { id: 's8-4', text: '[High] Không xử lý lỗi media group (retry)', tags: ['high'] },
                        { id: 's8-5', text: '[High] View session chỉ dùng một album (ghi đè)', tags: ['high'] },
                        { id: 's8-6', text: '[Medium] Cập nhật lastActivity khi chờ tên', tags: ['medium'] },
                        { id: 's8-7', text: '[Medium] Giới hạn số GIF', tags: ['medium'] },
                        { id: 's8-8', text: '[Medium] Tìm kiếm LIKE không tối ưu (FTS5)', tags: ['medium'] },
                        { id: 's8-9', text: '[Medium] Thiếu tính năng chỉnh sửa album', tags: ['medium'] },
                        { id: 's8-10', text: '[Low] Tách code thành module', tags: ['low'] },
                        { id: 's8-11', text: '[Low] Thêm unit test', tags: ['low'] },
                        { id: 's8-12', text: '[Low] Hỗ trợ caption', tags: ['low'] },
                        { id: 's8-13', text: '[Low] Thống kê và lịch sử', tags: ['low'] },
                    ]
                }]
            }, {
                id: 'sec9',
                title: '📅 9. Kế hoạch sửa chữa',
                subs: [{
                    title: 'Ngay lập tức',
                    items: [
                        { id: 's9-1', text: 'Sửa callback data myp_ (lưu keyword vào session)', tags: ['critical', 'plan'] },
                        { id: 's9-2', text: 'Thêm bot.catch error handler toàn cục', tags: ['critical', 'plan'] },
                    ]
                }, {
                    title: 'Trong tuần',
                    items: [
                        { id: 's9-3', text: 'Sửa race condition bằng queue', tags: ['high', 'plan'] },
                        { id: 's9-4', text: 'Thay đổi view session key (userId:albumId)', tags: ['high', 'plan'] },
                        { id: 's9-5', text: 'Thêm apiCall cho tất cả media group', tags: ['high', 'plan'] },
                        { id: 's9-6', text: 'Cập nhật lastActivity khi chờ tên', tags: ['medium', 'plan'] },
                    ]
                }, {
                    title: 'Trong tháng',
                    items: [
                        { id: 's9-7', text: 'Cân nhắc dùng FTS5 cho tìm kiếm', tags: ['medium', 'plan'] },
                        { id: 's9-8', text: 'Xây dựng tính năng chỉnh sửa album', tags: ['high', 'plan'] },
                        { id: 's9-9', text: 'Tách code thành module (DB, session, view, handler)', tags: ['low', 'plan'] },
                    ]
                }, {
                    title: 'Dài hạn',
                    items: [
                        { id: 's9-10', text: 'Chuyển session sang Redis nếu mở rộng', tags: ['medium', 'plan'] },
                        { id: 's9-11', text: 'Thêm tính năng bảo mật (mật khẩu, public/private)', tags: ['medium', 'plan'] },
                        { id: 's9-12', text: 'Viết unit test', tags: ['low', 'plan'] },
                    ]
                }]
            }];

            // ==================== STATE ====================
            const STORAGE_KEY = 'telegram_bot_checklist_state';
            let checkedState = {}; // { itemId: true/false }
            let currentFilter = 'all';

            // Load state
            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        checkedState = JSON.parse(raw);
                    }
                } catch (e) {
                    checkedState = {};
                }
            }

            // Save state
            function saveState() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
                } catch (e) {
                    showToast('⚠️ Không thể lưu trạng thái (localStorage đầy?)');
                }
            }

            // Get all item IDs
            function getAllItemIds() {
                const ids = [];
                checklistData.forEach(sec => {
                    sec.subs.forEach(sub => {
                        sub.items.forEach(item => ids.push(item.id));
                    });
                });
                return ids;
            }

            // Count
            function getCounts() {
                const allIds = getAllItemIds();
                const total = allIds.length;
                let done = 0;
                allIds.forEach(id => {
                    if (checkedState[id]) done++;
                });
                return { total, done };
            }

            // Update UI counts & progress
            function updateStats() {
                const { total, done } = getCounts();
                const percent = total > 0 ? Math.round((done / total) * 100) : 0;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('doneCount').textContent = done;
                document.getElementById('percentText').textContent = percent + '%';
                document.getElementById('progressPercent').textContent = percent + '%';
                document.getElementById('progressFill').style.width = percent + '%';
            }

            // ==================== RENDER ====================
            function renderAll() {
                const container = document.getElementById('sectionsContainer');
                container.innerHTML = '';

                checklistData.forEach(sec => {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'section';
                    sectionEl.id = sec.id;

                    // Section header
                    const headerEl = document.createElement('div');
                    headerEl.className = 'section-header';
                    headerEl.innerHTML = `
                <h2>${sec.title}</h2>
                <span class="arrow">▼</span>
              `;
                    headerEl.addEventListener('click', () => {
                        sectionEl.classList.toggle('collapsed');
                    });

                    // Section body
                    const bodyEl = document.createElement('div');
                    bodyEl.className = 'section-body';

                    sec.subs.forEach(sub => {
                        const subDiv = document.createElement('div');
                        subDiv.className = 'sub-section';

                        const subTitle = document.createElement('div');
                        subTitle.className = 'sub-section-title';
                        subTitle.textContent = sub.title;
                        subDiv.appendChild(subTitle);

                        sub.items.forEach(item => {
                            // Check filter
                            if (currentFilter !== 'all') {
                                const hasTag = item.tags && item.tags.some(t =>
                                    t === currentFilter || (currentFilter === 'feature' && t ===
                                        'feature') || (currentFilter === 'plan' && t === 'plan')
                                );
                                if (!hasTag) return;
                            }

                            const itemEl = document.createElement('div');
                            itemEl.className = 'checklist-item';
                            if (checkedState[item.id]) {
                                itemEl.classList.add('checked');
                            }
                            itemEl.dataset.itemId = item.id;

                            itemEl.innerHTML = `
                    <div class="check-box">✓</div>
                    <div class="item-content">
                      <div class="item-text">${item.text}</div>
                      ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
                      ${item.tags ? `<div class="item-tags">${item.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('')}</div>` : ''}
                      ${item.code ? `<div class="code-block">${escapeHTML(item.code)}</div>` : ''}
                    </div>
                  `;

                            itemEl.addEventListener('click', (e) => {
                                // Don't toggle if clicking on code block (allow text selection)
                                if (e.target.closest('.code-block')) return;
                                toggleItem(item.id, itemEl);
                            });

                            subDiv.appendChild(itemEl);
                        });

                        // Only append if has visible items
                        if (subDiv.querySelectorAll('.checklist-item').length > 0) {
                            bodyEl.appendChild(subDiv);
                        }
                    });

                    sectionEl.appendChild(headerEl);
                    sectionEl.appendChild(bodyEl);
                    container.appendChild(sectionEl);
                });

                updateStats();
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function toggleItem(itemId, itemEl) {
                checkedState[itemId] = !checkedState[itemId];
                if (checkedState[itemId]) {
                    itemEl.classList.add('checked');
                } else {
                    itemEl.classList.remove('checked');
                }
                saveState();
                updateStats();
            }

            // ==================== FILTER ====================
            function setFilter(filter) {
                currentFilter = filter;
                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.classList.remove('active');
                    if (chip.dataset.filter === filter) {
                        chip.classList.add('active');
                    }
                });
                renderAll();
            }

            // ==================== ACTIONS ====================
            function checkAll() {
                const allIds = getAllItemIds();
                allIds.forEach(id => { checkedState[id] = true; });
                saveState();
                renderAll();
                showToast('✅ Đã check tất cả!');
            }

            function uncheckAll() {
                const allIds = getAllItemIds();
                allIds.forEach(id => { checkedState[id] = false; });
                saveState();
                renderAll();
                showToast('⬜ Đã bỏ check tất cả!');
            }

            function resetAll() {
                if (confirm('Bạn có chắc muốn reset về trạng thái mặc định? Dữ liệu check sẽ bị xóa.')) {
                    checkedState = {};
                    saveState();
                    renderAll();
                    showToast('🔄 Đã reset về mặc định!');
                }
            }

            function exportState() {
                const { total, done } = getCounts();
                const percent = total > 0 ? Math.round((done / total) * 100) : 0;
                let report = `📋 Checklist Bot Telegram Album\n`;
                report += `📊 Tiến độ: ${done}/${total} (${percent}%)\n`;
                report += `📅 Xuất lúc: ${new Date().toLocaleString()}\n\n`;

                checklistData.forEach(sec => {
                    report += `\n${'='.repeat(50)}\n`;
                    report += `${sec.title}\n`;
                    report += `${'='.repeat(50)}\n`;
                    sec.subs.forEach(sub => {
                        report += `\n  ▸ ${sub.title}\n`;
                        sub.items.forEach(item => {
                            const status = checkedState[item.id] ? '✅' : '⬜';
                            report += `    ${status} ${item.text}\n`;
                            if (item.desc) report += `       └─ ${item.desc}\n`;
                        });
                    });
                });

                // Copy to clipboard
                navigator.clipboard.writeText(report).then(() => {
                    showToast('📋 Đã sao chép báo cáo vào clipboard!');
                }).catch(() => {
                    // Fallback: download as file
                    const blob = new Blob([report], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'checklist-bot-telegram.txt';
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('📥 Đã tải xuống báo cáo!');
                });
            }

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ==================== INIT ====================
            function init() {
                loadState();
                renderAll();
                updateStats();

                // Filter click handlers
                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        setFilter(chip.dataset.filter);
                    });
                });

                // Keyboard shortcut: Ctrl+Shift+C -> check all, Ctrl+Shift+U -> uncheck all
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                        e.preventDefault();
                        checkAll();
                    }
                    if (e.ctrlKey && e.shiftKey && e.key === 'U') {
                        e.preventDefault();
                        uncheckAll();
                    }
                });
            }

            // Expose to global scope for button onclick
            window.checkAll = checkAll;
            window.uncheckAll = uncheckAll;
            window.resetAll = resetAll;
            window.exportState = exportState;

            init();
        })();
    </script>
</body>
</html>
