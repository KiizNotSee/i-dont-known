<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tạo Bài Đăng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Dark & Vibrant */
            --bg-primary: #0a0b0f;
            --bg-secondary: #12141c;
            --bg-tertiary: #1a1d28;
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-accent: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-subtle: linear-gradient(180deg, rgba(102, 126, 234, 0.1) 0%, transparent 100%);
            
            /* Glow Effects */
            --glow-primary: 0 0 20px rgba(102, 126, 234, 0.5);
            --glow-focus: 0 0 0 3px rgba(102, 126, 234, 0.3);
            --glow-input: 0 0 20px rgba(102, 126, 234, 0.1);
            
            /* Text Colors */
            --text-primary: #f0f2f5;
            --text-secondary: #a0a8b8;
            --text-muted: #6b7280;
            
            /* Accent Colors */
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            
            /* Spacing & Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
            --transition-slow: 0.4s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(79, 172, 254, 0.05) 0%, transparent 70%);
            animation: meshMove 20s ease-in-out infinite;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }

        /* Header Card */
        .header-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 40px 30px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            transition: var(--transition-base);
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), var(--glow-primary);
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5));
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a0a8b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Section Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            transition: all var(--transition-base);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        /* Section Title */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .section-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-subtle);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: var(--transition-base);
        }

        .card:hover .section-icon {
            background: var(--gradient-primary);
            border-color: transparent;
            transform: scale(1.05);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition-base);
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        input:hover,
        textarea:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent-primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: var(--glow-focus), var(--glow-input);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        /* Form Grid */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Stats Display */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: var(--glass-bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            transition: var(--transition-base);
        }

        .stat-item:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .btn {
            position: relative;
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            overflow: hidden;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6), var(--glow-primary);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* Output Area */
        .output-wrapper {
            margin-top: 24px;
            position: relative;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .output-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }

        .icon-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(102, 126, 234, 0.1);
        }

        textarea.code-output {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #a5b3ce;
            min-height: 200px;
            padding: 20px;
        }

        textarea.code-output:focus {
            border-color: var(--accent-primary);
            box-shadow: var(--glow-focus);
        }

        /* Alert/Toast */
        .alert {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            opacity: 0;
            transition: all var(--transition-base);
            z-index: 1000;
        }

        .alert.show {
            transform: translateX(0);
            opacity: 1;
        }

        .alert-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .alert-success .alert-icon {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
        }

        .alert-warning .alert-icon {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-warning);
        }

        .alert-error .alert-icon {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-error);
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .alert-message {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Loading Animation */
        .loading {
            position: relative;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }

            .header-card {
                padding: 30px 20px;
            }

            .header-title {
                font-size: 24px;
            }

            .form-row,
            .btn-group {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .alert {
                left: 16px;
                right: 16px;
                transform: translateY(-100px);
            }

            .alert.show {
                transform: translateY(0);
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Selection */
        ::selection {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header-card">
            <div class="header-icon">🚀</div>
            <h1 class="header-title">TOOL TẠO BÀI ĐĂNG</h1>
        </div>

        <!-- HTML Extract Section -->
        <div class="card">
            <div class="section-header">
                <div class="section-icon">🔄</div>
                <div>
                    <div class="section-title">TRÍCH XUẤT HTML</div>
                </div>
            </div>
            <div class="form-group">
                <textarea id="htmlInput" placeholder="Dán HTML..."></textarea>
            </div>
            <div class="stats-grid" id="extractStats" style="display: none;">
                <div class="stat-item">
                    <div class="stat-value" id="foundCount">0</div>
                    <div class="stat-label">Images Found</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="coverStatus">❌</div>
                    <div class="stat-label">Cover Set</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="qualityStatus">✨</div>
                    <div class="stat-label">HQ URLs</div>
                </div>
            </div>
        </div>

        <!-- Info Section -->
        <div class="card">
            <div class="section-header">
                <div class="section-icon">📝</div>
                <div>
                    <div class="section-title">THÔNG TIN</div>             
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Cosplayer</label>
                <input type="text" id="cosplayer" placeholder="Tên Cosplayer...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Character</label>
                    <input type="text" id="character" placeholder="Tên Nhân Vật...">
                </div>
                <div class="form-group">
                    <label class="form-label">Series</label>
                    <input type="text" id="series" placeholder="Tên Series/Game...">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Số Ảnh</label>
                    <input type="number" id="photoCount" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Số Video</label>
                    <input type="number" id="videoCount" placeholder="0">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ảnh bìa</label>
                <input type="url" id="coverImage" placeholder="https://...">
            </div>

            <div class="form-group">
                <label class="form-label">Link tải xuống</label>
                <input type="url" id="downloadLink" placeholder="https://...">
            </div>

            <div class="form-group">
                <label class="form-label">Danh sách URL ảnh</label>
                <textarea id="imageUrls" placeholder="Mỗi URL Trên Một Dòng..."></textarea>
            </div>
        </div>

        <!-- Generate Section -->
        <div class="card">
            <div class="section-header">
                <div class="section-icon">⚡</div>
                <div>
                    <div class="section-title">TẠO MÃ HTML</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn">
                    <span>✨</span> TẠO MÃ HTML
                </button>
                <button class="btn btn-secondary" id="copyBtn">
                    <span>📋</span> SAO CHÉP
                </button>
            </div>

            <div class="output-wrapper">
                <div class="output-header">
                    <span class="output-label">Mã HTML Output</span>
                    <div class="output-actions">
                        <button class="icon-btn" id="clearBtn" title="Xóa">🗑️</button>
                        <button class="icon-btn" id="downloadBtn" title="Tải xuống">💾</button>
                    </div>
                </div>
                <textarea id="outputCode" class="code-output" readonly placeholder="Mã HTML Sẽ Xuất Hiện Ở Đây..."></textarea>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <script>
        // Configuration
        const CONFIG = {
            defaults: {
                cosplayer: 'Unknown',
                character: 'Unknown',
                series: 'Unknown',
                downloadLink: '#'
            },
            alertDuration: 3000
        };

        // DOM Elements
        const elements = {
            htmlInput: document.getElementById('htmlInput'),
            cosplayer: document.getElementById('cosplayer'),
            character: document.getElementById('character'),
            series: document.getElementById('series'),
            photoCount: document.getElementById('photoCount'),
            videoCount: document.getElementById('videoCount'),
            coverImage: document.getElementById('coverImage'),
            downloadLink: document.getElementById('downloadLink'),
            imageUrls: document.getElementById('imageUrls'),
            outputCode: document.getElementById('outputCode'),
            generateBtn: document.getElementById('generateBtn'),
            copyBtn: document.getElementById('copyBtn'),
            clearBtn: document.getElementById('clearBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            extractStats: document.getElementById('extractStats'),
            foundCount: document.getElementById('foundCount'),
            coverStatus: document.getElementById('coverStatus'),
            alertContainer: document.getElementById('alertContainer')
        };

        // Utility Functions
        function showAlert(title, message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <div class="alert-icon">${type === 'success' ? '✓' : type === 'warning' ? '⚠' : '✕'}</div>
                <div class="alert-content">
                    <div class="alert-title">${title}</div>
                    <div class="alert-message">${message}</div>
                </div>
            `;
            
            elements.alertContainer.appendChild(alert);
            
            // Trigger animation
            requestAnimationFrame(() => alert.classList.add('show'));
            
            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => alert.remove(), 300);
            }, CONFIG.alertDuration);
        }

        function updateStats(count, hasCover) {
            elements.foundCount.textContent = count;
            elements.coverStatus.textContent = hasCover ? '✅' : '❌';
            elements.extractStats.style.display = count > 0 ? 'grid' : 'none';
        }

        function extractHighQualityUrl(url) {
            if (url.includes('/s') && url.includes('/')) {
                return url.replace(/\/s\d+\//, '/s0/');
            }
            return url;
        }

        function extractImageUrls(html) {
            const urls = new Set();
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                doc.querySelectorAll('a[href], img[src]').forEach(el => {
                    const url = el.getAttribute('href') || el.getAttribute('src');
                    if (url && isImageUrl(url)) {
                        urls.add(extractHighQualityUrl(url));
                    }
                });
                
                return Array.from(urls);
            } catch (e) {
                console.error('Parse error:', e);
                return [];
            }
        }

        function isImageUrl(url) {
            const exts = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'];
            const lower = url.toLowerCase();
            return exts.some(ext => lower.includes(ext)) || 
                   lower.includes('blogger') || 
                   lower.includes('blogspot');
        }

        // Event Handlers
        let extractTimeout;
        elements.htmlInput.addEventListener('input', () => {
            clearTimeout(extractTimeout);
            extractTimeout = setTimeout(() => {
                const html = elements.htmlInput.value.trim();
                if (!html) {
                    updateStats(0, false);
                    return;
                }
                
                const urls = extractImageUrls(html);
                if (urls.length === 0) {
                    showAlert('Không tìm thấy ảnh', 'Vui lòng kiểm tra lại HTML đã dán', 'warning');
                    updateStats(0, false);
                    return;
                }
                
                if (urls[0]) elements.coverImage.value = urls[0];
                elements.photoCount.value = urls.length;
                elements.imageUrls.value = urls.join('\n');
                
                updateStats(urls.length, !!urls[0]);
                showAlert('Trích xuất thành công', `Đã tìm thấy ${urls.length} ảnh chất lượng cao`);
            }, 500);
        });

        elements.imageUrls.addEventListener('input', () => {
            const count = elements.imageUrls.value.split('\n').filter(l => l.trim()).length;
            elements.photoCount.value = count;
        });

        elements.generateBtn.addEventListener('click', () => {
            const cosplayer = elements.cosplayer.value.trim() || CONFIG.defaults.cosplayer;
            const character = elements.character.value.trim() || CONFIG.defaults.character;
            const series = elements.series.value.trim() || CONFIG.defaults.series;
            const photoCount = elements.photoCount.value || '0';
            const videoCount = elements.videoCount.value || '0';
            const downloadLink = elements.downloadLink.value.trim() || CONFIG.defaults.downloadLink;
            
            const imageUrls = elements.imageUrls.value
                .split('\n')
                .map(u => u.trim())
                .filter(u => u);
            
            if (imageUrls.length === 0) {
                showAlert('Thiếu dữ liệu', 'Vui lòng thêm ít nhất 1 URL ảnh', 'warning');
                return;
            }
            
            elements.generateBtn.classList.add('loading');
            
            setTimeout(() => {
                const imagesHtml = imageUrls.map((url, i) => 
                    `    <img src="${url}" alt="Ảnh ${i + 1}" loading="lazy">`
                ).join('\n');
                
                const template = `<div class="r18-wrap" id="r18PostWrap" style="margin-top:16px">

  <div id="r18-img-source">
${imagesHtml}
  </div>

  <fieldset class="r18-fieldset" id="file-info">
    <legend class="r18-fieldset__legend">📄 File Information</legend>
    <ul class="r18-file-list">
      <li class="r18-file-list__row"><span class="r18-file-list__key">👤 Cosplayer</span><span class="r18-file-list__val"><strong>${cosplayer}</strong></span></li>
      <li class="r18-file-list__row"><span class="r18-file-list__key">🎭 Character</span><span class="r18-file-list__val"><strong>${character}</strong></span></li>
      <li class="r18-file-list__row"><span class="r18-file-list__key">📺 Series</span><span class="r18-file-list__val"><strong>${series}</strong></span></li>
      <li class="r18-file-list__row"><span class="r18-file-list__key">🖼️ Photos</span><span class="r18-file-list__val"><strong>${photoCount}</strong> Photos</span></li>
      <li class="r18-file-list__row"><span class="r18-file-list__key">🎬 Videos</span><span class="r18-file-list__val"><strong>${videoCount}</strong> Videos</span></li>
    </ul>
  </fieldset>

  <fieldset class="r18-fieldset" id="dl-section">
    <legend class="r18-fieldset__legend">⬇️ Download Link</legend>
    <div class="r18-dl-actions">
      <div>
        <div class="r18-dl-host">☁️ MediaFire</div>
        <a class="r18-btn r18-btn--primary r18-btn--full" href="${downloadLink}" target="_blank" rel="nofollow noopener">💾 DOWNLOAD</a>
      </div>
    </div>
  </fieldset>

</div>`;
                
                elements.outputCode.value = template;
                elements.generateBtn.classList.remove('loading');
                showAlert('Tạo mã thành công', 'Mã HTML đã sẵn sàng để sử dụng');
            }, 400);
        });

        elements.copyBtn.addEventListener('click', async () => {
            const code = elements.outputCode.value;
            if (!code) {
                showAlert('Chưa có mã', 'Vui lòng tạo mã HTML trước', 'warning');
                return;
            }
            
            elements.copyBtn.classList.add('loading');
            
            try {
                await navigator.clipboard.writeText(code);
                showAlert('Sao chép thành công', 'Mã HTML đã được lưu vào clipboard');
            } catch (err) {
                elements.outputCode.select();
                document.execCommand('copy');
                showAlert('Sao chép thành công', 'Mã HTML đã được lưu vào clipboard');
            }
            
            elements.copyBtn.classList.remove('loading');
        });

        elements.clearBtn.addEventListener('click', () => {
            elements.outputCode.value = '';
            showAlert('Đã xóa', 'Nội dung output đã được xóa');
        });

        elements.downloadBtn.addEventListener('click', () => {
            const code = elements.outputCode.value;
            if (!code) {
                showAlert('Chưa có mã', 'Vui lòng tạo mã HTML trước', 'warning');
                return;
            }
            
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `post-${Date.now()}.html`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert('Tải xuống thành công', 'File HTML đã được lưu');
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                elements.generateBtn.click();
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                elements.copyBtn.click();
            }
        });

        console.log('🚀 Tool Tạo Bài Đăng 2026 Loaded');
        console.log('⌨️ Shortcuts: Ctrl+Enter = Generate | Ctrl+Shift+C = Copy');
    </script>
</body>
</html>
