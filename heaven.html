<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý văn bản bot Telegram</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            color: #1e293b;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #f1f5f9;
            text-align: left;
            padding: 12px 8px;
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 2px solid #cbd5e1;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        tr:hover {
            background: #f8fafc;
        }
        .stt {
            width: 50px;
            text-align: center;
            font-weight: 600;
            color: #64748b;
        }
        .loai {
            width: 120px;
            font-size: 12px;
            color: #334155;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            text-align: center;
        }
        .vi-tri {
            max-width: 200px;
            word-break: break-word;
            font-size: 12px;
            color: #475569;
        }
        .text-input {
            width: 100%;
            min-width: 250px;
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            background: #fefefe;
            transition: border 0.2s;
            resize: vertical;
        }
        .text-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            background: #e2e8f0;
            color: #1e293b;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn-success {
            background: #22c55e;
            color: white;
        }
        .btn-success:hover {
            background: #16a34a;
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #94a3b8;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .json-output {
            margin-top: 20px;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .json-output.active {
            display: block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .badge {
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #475569;
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .text-input {
                min-width: 120px;
                font-size: 12px;
            }
            th, td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>

<h1>✏️ Quản lý văn bản giao diện Bot</h1>

<div class="container">
    <table>
        <thead>
            <tr>

        <tbody id="table-body">

        <button class="btn btn-success" id="exportJsonBtn">📥 Xuất JSON</button>
        <button class="btn btn-primary" id="copyJsonBtn">📋 Sao chép JSON</button>
    </div>

    <div class="json-output" id="jsonOutput"></div>
</div>

<div id="toast" class="toast"></div>

    // Lưu dữ liệu hiện tại (sẽ được chỉnh sửa)
    let texts = [];

    // DOM elements
    const tbody = document.getElementById('table-body');
    const jsonOutput = document.getElementById('jsonOutput');
    const toast = document.getElementById('toast');

    // Helper: hiển thị toast
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._hideTimer);
        toast._hideTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // Render bảng
    function renderTable(data) {
        tbody.innerHTML = '';
        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="stt">${item.id}</td>
                <td><span class="loai">${item.loai}</span></td>
                <td class="vi-tri">${item.viTri}</td>
                <td><textarea class="text-input" data-id="${item.id}" rows="2">${item.text}</textarea></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Lấy dữ liệu từ các textarea
    function getDataFromUI() {
        const rows = document.querySelectorAll('#table-body tr');
        const result = [];
        rows.forEach(row => {
            const id = parseInt(row.querySelector('textarea').dataset.id);
            const text = row.querySelector('textarea').value;
            const loai = row.querySelector('.loai').textContent;
            const viTri = row.querySelector('.vi-tri').textContent;
            result.push({ id, loai, viTri, text });
        });
        return result;
    }

    // Khởi tạo dữ liệu từ DEFAULT
    function resetToDefault() {
        texts = DEFAULT_TEXTS.map(item => ({ ...item }));
        renderTable(texts);
        jsonOutput.classList.remove('active');
        showToast('Đã khôi phục dữ liệu gốc');
    }

    // Xuất JSON và hiển thị
    function exportJSON() {
        const currentData = getDataFromUI();
        const json = JSON.stringify(currentData, null, 2);
        jsonOutput.textContent = json;
        jsonOutput.classList.add('active');
        showToast('JSON đã được tạo');
    }

    // Sao chép JSON
    function copyJSON() {
        const json = jsonOutput.textContent;
        if (!json) {
            // Nếu chưa xuất, tự động xuất trước
            exportJSON();
        }
        const text = jsonOutput.textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('✅ Đã sao chép JSON vào clipboard');
        }).catch(() => {
            // fallback
            const range = document.createRange();
            range.selectNodeContents(jsonOutput);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            document.execCommand('copy');
            showToast('✅ Đã sao chép JSON (fallback)');
        });
    }

    // Sự kiện
    document.getElementById('resetBtn').addEventListener('click', resetToDefault);
    document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
    document.getElementById('copyJsonBtn').addEventListener('click', copyJSON);

    // Khởi tạo
    resetToDefault();
</script>
